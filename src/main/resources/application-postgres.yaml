spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/simple_lms
    driver-class-name: org.postgresql.Driver
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    contexts: postgres
