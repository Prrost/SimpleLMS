<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>SimpleLMS — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    .container { max-width: 820px; margin: 40px auto; padding: 0 16px 60px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #333; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid.three { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 560px) { .grid, .grid.three { grid-template-columns: 1fr; } }

    label { display: block; font-size: 0.8rem; font-weight: 500; color: #555; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 8px 12px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.9rem; outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: #4f6ef7; }

    .students-box {
      font-family: monospace; font-size: 0.82rem;
      width: 100%; min-height: 260px; padding: 10px 12px;
      border: 1px solid #ddd; border-radius: 8px;
      outline: none; resize: vertical; line-height: 1.7;
    }
    .students-box:focus { border-color: #4f6ef7; }
    .hint { font-size: 0.75rem; color: #999; margin-top: 5px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-danger  { background: #e74c3c; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

    #run-btn { width: 100%; justify-content: center; font-size: 1rem; padding: 13px; }

    /* Log */
    #log {
      background: #111827; color: #e2e8f0;
      border-radius: 12px; padding: 20px;
      font-family: monospace; font-size: 0.82rem;
      min-height: 80px; max-height: 420px;
      overflow-y: auto; white-space: pre-wrap; line-height: 1.6;
    }
    .log-ok   { color: #4ade80; }
    .log-err  { color: #f87171; }
    .log-info { color: #93c5fd; }
    .log-warn { color: #fbbf24; }
    .log-dim  { color: #6b7280; }

    .progress-bar-wrap {
      background: #e2e8f0; border-radius: 99px; height: 6px;
      margin-top: 14px; overflow: hidden; display: none;
    }
    #progress-bar {
      height: 100%; background: #4f6ef7;
      border-radius: 99px; width: 0%;
      transition: width .3s;
    }

    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-top: 14px; display: none;
    }
    .summary-grid.visible { display: grid; }
    .stat-box {
      background: #f8faff; border: 1px solid #e0e7ff;
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .stat-box .num { font-size: 1.5rem; font-weight: 700; color: #4f6ef7; }
    .stat-box .lbl { font-size: 0.72rem; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
<div class="container">
  <h1>SimpleLMS — Setup</h1>
  <p class="subtitle">Создаёт студентов, группу, аудиторию и урок через API</p>

  <!-- API base -->
  <div class="card">
    <h2>Подключение</h2>
    <div>
      <label>API Base URL</label>
      <input id="apiBase" type="text" value="http://localhost:8080" />
    </div>
  </div>

  <!-- Students -->
  <div class="card">
    <h2>Список студентов</h2>
    <textarea id="studentsRaw" class="students-box">Aarav Sharma
Alexander Macedonski
Ananya Rao
Benjamin Harris
Charlotte Anderson
Daniel Brooks
Emma Johnson
Ethan Walker
James Cooper
Jesus Christ
Kim Chin
Liam Carter
Lucas Bennett
Mansur Serikov
Mason Turner
Mei Lin
Michael Foster
Noah Mitchell
Olzhas Umarov
Osborn Octavius
Rahul Verma
Sakura Yamamoto
Sara Netanyahu</textarea>
    <p class="hint">Каждая строка — «Имя Фамилия». Пустые строки игнорируются.</p>
  </div>

  <!-- Group -->
  <div class="card">
    <h2>Группа</h2>
    <div class="grid">
      <div>
        <label>Название группы</label>
        <input id="groupName" type="text" value="CS-2025" />
      </div>
      <div>
        <label>Виртуальная группа</label>
        <select id="groupVirtual">
          <option value="false">Нет</option>
          <option value="true">Да</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Classroom -->
  <div class="card">
    <h2>Аудитория</h2>
    <div>
      <label>Название / номер аудитории</label>
      <input id="classroomName" type="text" value="Ауд. 301" />
    </div>
  </div>

  <!-- Lesson -->
  <div class="card">
    <h2>Урок</h2>
    <div class="grid">
      <div>
        <label>Название урока</label>
        <input id="lessonName" type="text" value="Вводная лекция" />
      </div>
      <div>
        <label>Дата</label>
        <input id="lessonDate" type="date" />
      </div>
    </div>
    <div class="grid" style="margin-top:14px">
      <div>
        <label>Начало</label>
        <input id="lessonStart" type="time" value="09:00" />
      </div>
      <div>
        <label>Конец</label>
        <input id="lessonEnd" type="time" value="10:30" />
      </div>
    </div>
  </div>

  <!-- Run -->
  <div class="card" style="padding:20px 28px">
    <button id="run-btn" class="btn btn-primary" onclick="run()">▶ Запустить setup</button>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <div class="summary-grid" id="summary">
      <div class="stat-box"><div class="num" id="s-students">0</div><div class="lbl">Студентов</div></div>
      <div class="stat-box"><div class="num" id="s-groups">0</div><div class="lbl">Групп</div></div>
      <div class="stat-box"><div class="num" id="s-classrooms">0</div><div class="lbl">Аудиторий</div></div>
      <div class="stat-box"><div class="num" id="s-lessons">0</div><div class="lbl">Уроков</div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
      <h2 style="margin:0">Лог</h2>
      <button class="btn btn-danger btn-sm" onclick="clearLog()">Очистить</button>
    </div>
    <div id="log"><span class="log-dim">Лог пуст. Нажмите «Запустить setup».</span></div>
  </div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls = '') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() {
  logEl.innerHTML = '<span class="log-dim">Лог очищен.</span>\n';
}

let total = 0, done = 0;
function setProgress(d, t) {
  done = d; total = t;
  const pct = t ? Math.round(d / t * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function toISO(date, time) {
  return `${date}T${time}:00`;
}

async function api(method, path, body) {
  const base = document.getElementById('apiBase').value.replace(/\/$/, '');
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(base + path, opts);
  if (!res.ok) {
    let detail = '';
    try { detail = JSON.stringify(await res.json()); } catch { detail = await res.text(); }
    throw new Error(`HTTP ${res.status}: ${detail}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function parseStudents(raw) {
  return raw.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .map(l => {
      const parts = l.split(/\s+/);
      const name = parts[0] || '';
      const lastName = parts.slice(1).join(' ') || '—';
      return { name, lastName };
    });
}

// ── main ─────────────────────────────────────────────────────────────────────
async function run() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Выполняется…';

  logEl.innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('summary').classList.remove('visible');

  const stats = { students: 0, groups: 0, classrooms: 0, lessons: 0 };

  try {
    const students   = parseStudents(document.getElementById('studentsRaw').value);
    const groupName  = document.getElementById('groupName').value.trim();
    const isVirtual  = document.getElementById('groupVirtual').value === 'true';
    const classroom  = document.getElementById('classroomName').value.trim();
    const lessonName = document.getElementById('lessonName').value.trim();
    const date       = document.getElementById('lessonDate').value;
    const start      = document.getElementById('lessonStart').value;
    const end        = document.getElementById('lessonEnd').value;

    if (!date) { alert('Укажите дату урока'); btn.disabled = false; btn.textContent = '▶ Запустить setup'; return; }

    const STEPS = students.length + 3; // students + group + classroom + lesson
    setProgress(0, STEPS);

    // ── 1. Create students ──────────────────────────────────────────────────
    log('── Создание студентов ──────────────────', 'log-info');
    const studentIds = [];
    for (const s of students) {
      try {
        const res = await api('POST', '/api/student', {
          name: s.name,
          lastName: s.lastName,
          email: null,
          phone: null,
          studentGroupsIds: [],
        });
        studentIds.push(res.id);
        log(`  ✓ ${s.name} ${s.lastName}  (id=${res.id})`, 'log-ok');
        stats.students++;
      } catch (e) {
        log(`  ✗ ${s.name} ${s.lastName}: ${e.message}`, 'log-err');
      }
      setProgress(done + 1, STEPS);
    }

    // ── 2. Create group with all students ───────────────────────────────────
    log('\n── Создание группы ─────────────────────', 'log-info');
    let groupId;
    try {
      const res = await api('POST', '/api/student_group', {
        name: groupName,
        isVirtual: isVirtual,
        studentIds: studentIds,
      });
      groupId = res.id;
      log(`  ✓ Группа «${groupName}» (id=${groupId}), студентов: ${studentIds.length}`, 'log-ok');
      stats.groups++;
    } catch (e) {
      log(`  ✗ Группа: ${e.message}`, 'log-err');
      throw e;
    } finally { setProgress(done + 1, STEPS); }

    // ── 3. Create classroom ─────────────────────────────────────────────────
    log('\n── Создание аудитории ──────────────────', 'log-info');
    let classroomId;
    try {
      const res = await api('POST', '/api/classroom', { name: classroom });
      classroomId = res.id;
      log(`  ✓ Аудитория «${classroom}» (id=${classroomId})`, 'log-ok');
      stats.classrooms++;
    } catch (e) {
      log(`  ✗ Аудитория: ${e.message}`, 'log-err');
      throw e;
    } finally { setProgress(done + 1, STEPS); }

    // ── 4. Create lesson ────────────────────────────────────────────────────
    log('\n── Создание урока ──────────────────────', 'log-info');
    let lessonId;
    try {
      const res = await api('POST', '/api/lesson', {
        name: lessonName,
        classroomId: classroomId,
        studentGroupId: groupId,
        startsAt: toISO(date, start),
        endsAt: toISO(date, end),
      });
      lessonId = res.id;
      log(`  ✓ Урок «${lessonName}» (id=${lessonId})`, 'log-ok');
      log(`    Начало: ${date} ${start}  →  Конец: ${end}`, 'log-dim');
      stats.lessons++;
    } catch (e) {
      log(`  ✗ Урок: ${e.message}`, 'log-err');
      throw e;
    } finally { setProgress(done + 1, STEPS); }

    // ── Done ────────────────────────────────────────────────────────────────
    log('\n✅ Готово!', 'log-ok');
    log(`   Студентов создано: ${stats.students}/${students.length}`, 'log-ok');
    log(`   Группа id=${groupId}, Аудитория id=${classroomId}, Урок id=${lessonId}`, 'log-dim');

  } catch (e) {
    log(`\n🛑 Остановлено: ${e.message}`, 'log-err');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Запустить setup';
    document.getElementById('s-students').textContent  = stats.students;
    document.getElementById('s-groups').textContent    = stats.groups;
    document.getElementById('s-classrooms').textContent = stats.classrooms;
    document.getElementById('s-lessons').textContent   = stats.lessons;
    document.getElementById('summary').classList.add('visible');
  }
}

// Set today's date as default
(function() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('lessonDate').value =
    `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
})();
</script>
</body>
</html>
